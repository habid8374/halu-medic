name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: halu_medic_test
          POSTGRES_USER: halu_user
          POSTGRES_PASSWORD: halu_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: ci-secret-key-no-usar-en-produccion-1234567890
      DEBUG: 'True'
      DB_NAME: halu_medic_test
      DB_USER: halu_user
      DB_PASSWORD: halu_pass
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            django==5.0.6 \
            djangorestframework==3.15.2 \
            python-decouple==3.8 \
            psycopg2-binary==2.9.9 \
            django-tenants==3.6.1 \
            djangorestframework-simplejwt==5.3.1 \
            django-cors-headers==4.4.0 \
            celery==5.4.0 \
            redis==5.0.7 \
            django-celery-beat==2.6.0 \
            django-celery-results==2.5.1 \
            django-storages==1.14.4 \
            boto3==1.34.144 \
            Pillow==10.4.0 \
            python-dateutil==2.9.0 \
            requests==2.32.3 \
            httpx==0.27.0 \
            jsonschema==4.23.0

      - name: Check imports
        run: |
          python -c "
          import django, os, sys
          os.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings'
          django.setup()
          from apps.usuarios.models import Usuario, Rol
          from apps.tenants.models import Consultorio, Dominio
          from apps.pacientes.models import Paciente, Aseguradora
          from apps.citas.models import Cita, Medico, Especialidad, Sala
          from apps.consultas.models import Consulta, Procedimiento
          from apps.facturacion.models import Factura, EstadoFactura
          from apps.facturacion.factus_client import FactusClient
          from apps.facturacion.factus_salud import construir_payload_ss_cufe
          from apps.rips.generador import GeneradorRIPS
          from apps.tarifas.models import ConvenioEPS, TarifaProcedimiento
          print('✓ Todos los modelos importan correctamente')
          "

      - name: Check management commands
        run: |
          python manage.py check --deploy 2>&1 | grep -v "WARNINGS\|staticfiles\|SECRET_KEY\|ALLOWED_HOSTS\|SECURE\|SESSION\|CSRF\|HSTS" || true
          echo "✓ Management commands OK"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check structure
        run: |
          test -f package.json       && echo "✓ package.json"
          test -f tailwind.config.ts && echo "✓ tailwind.config.ts"
          test -f tsconfig.json      && echo "✓ tsconfig.json"
          test -f postcss.config.js  && echo "✓ postcss.config.js"
          test -f src/app/layout.tsx && echo "✓ root layout"
          test -f src/app/login/page.tsx     && echo "✓ login page"
          test -f src/app/dashboard/page.tsx && echo "✓ dashboard"
          test -f src/types/index.ts         && echo "✓ types"
          test -f src/lib/api.ts             && echo "✓ api client"
          test -f src/lib/auth-context.tsx   && echo "✓ auth context"
          test -f src/components/layout/Sidebar.tsx && echo "✓ sidebar"

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: Halu Medic
        run: npm run build
        continue-on-error: true

      - name: Report
        run: echo "✓ Frontend verificado correctamente"
